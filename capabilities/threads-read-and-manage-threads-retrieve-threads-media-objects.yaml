    description: Threads API — Read And Manage Threads > Retrieve Threads Media Objects business capability. Self-contained,
      no shared references.
    resources:
    - name: me-threads
      path: /me/threads
      operations:
      - name: get
        method: GET
        description: Get a List of All a User's Threads
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fields
          in: query
          type: string
          description: 'id (default): The media''s ID.'
        - name: limit
          in: query
          type: integer
          description: Query string parameter representing the maximum number of media objects or records to return
    - name: thread_id
      path: /{thread_id}
      operations:
      - name: get
        method: GET
        description: Get Threads Post Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fields
          in: query
          type: string
          description: 'id (default): The media''s ID.'
        - name: thread_id
          in: path
          type: string
          required: true
