naftiko: 1.0.0-alpha2
info:
  label: Threads API — Read And Manage Threads > Retrieve Threads Media Objects
  description: 'Threads API — Read And Manage Threads > Retrieve Threads Media Objects. 2 operations. Lead operation: Get
