    description: REST adapter for Threads API — Read And Manage Threads > Retrieve Threads Media Objects. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/me/threads
      name: me-threads
      description: REST surface for me-threads.
      operations:
      - method: GET
        name: get
        description: Get a List of All a User's Threads
        call: threads-read-and-manage-threads-retrieve-threads-media-objects.get
        with:
          fields: rest.fields
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/{thread-id}
      name: thread-id
      description: REST surface for thread_id.
      operations:
      - method: GET
        name: get
        description: Get Threads Post Details
        call: threads-read-and-manage-threads-retrieve-threads-media-objects.get
        with:
          fields: rest.fields
          thread_id: rest.thread_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
