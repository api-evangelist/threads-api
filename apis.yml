aid: threads-api
name: Threads
description: >-
  The Meta Threads API enables developers to build integrations for the Threads
  social media platform. It supports publishing text, image, video, carousel, and
  quote posts, reading and managing replies, accessing profile information, retrieving
  media insights, and managing account settings. Authentication uses OAuth 2.0
  with scoped access tokens.
type: Index
position: Consumer
access: 3rd-Party
