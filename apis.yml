apis:
  - aid: threads-api:threads-api
    name: Threads API
    description: >-
      The Threads API enables developers to build their own unique integrations,
      and helps creators and brands manage their Threads presence at scale. Supports
      single and carousel post publishing, reply management, profile retrieval,
      media insights, account insights, and publishing quota management. Requires
      OAuth 2.0 user access tokens with appropriate scopes.
    humanURL: https://developers.facebook.com/docs/threads/
